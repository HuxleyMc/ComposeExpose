name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string
      dry_run:
        description: Build and upload the Central bundle artifact without publishing to Central
        required: true
        default: true
        type: boolean
      publishing_type:
        description: Central Portal publishing type
        required: true
        default: USER_MANAGED
        type: choice
        options:
          - USER_MANAGED
          - AUTOMATIC

permissions:
  contents: read

jobs:
  release:
    name: Maven Central release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CENTRAL_NAMESPACE: io.github.huxleymc
      CENTRAL_NAMESPACE_ID: 16b9b04f-9917-4ddd-a12f-b9a9f24cef14
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release workflow
        run: ./scripts/verify-release-workflow.py

      - name: Check formatting
        run: ./gradlew --no-daemon spotlessCheck

      - name: Build all modules
        run: ./gradlew --no-daemon clean build

      - name: Verify publishing metadata
        run: ./scripts/verify-publishing-metadata.sh

      - name: Build Maven Central bundle
        run: ./scripts/build-central-bundle.sh "${{ inputs.version }}"

      - name: Upload Central bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: compose-expose-${{ inputs.version }}-central-bundle
          path: build/central-portal/compose-expose-${{ inputs.version }}-central-bundle.zip
          if-no-files-found: error

      - name: Upload bundle to Central Portal
        if: ${{ !inputs.dry_run }}
        run: ./scripts/upload-central-bundle.sh "build/central-portal/compose-expose-${{ inputs.version }}-central-bundle.zip" "${{ inputs.version }}" "${{ inputs.publishing_type }}"
