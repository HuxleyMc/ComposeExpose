name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    name: Maven Central release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CENTRAL_NAMESPACE: io.github.huxleymc
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
      PUBLISHING_TYPE: USER_MANAGED

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release workflow
        run: ./scripts/verify-release-workflow.py

      - name: Check formatting
        run: ./gradlew --no-daemon spotlessCheck

      - name: Build all modules
        run: ./gradlew --no-daemon clean build

      - name: Verify publishing metadata
        run: ./scripts/verify-publishing-metadata.sh

      - name: Resolve release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ -z "$version" || "$version" == "$GITHUB_REF_NAME" ]]; then
            echo "Release tags must use the v<version> format." >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build Maven Central bundle
        run: ./scripts/build-central-bundle.sh "$RELEASE_VERSION"

      - name: Upload Central bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: compose-expose-${{ github.ref_name }}-central-bundle
          path: build/central-portal/*-central-bundle.zip
          if-no-files-found: error

      - name: Upload bundle to Central Portal
        run: ./scripts/upload-central-bundle.sh "build/central-portal/compose-expose-$RELEASE_VERSION-central-bundle.zip" "$RELEASE_VERSION" "$PUBLISHING_TYPE"
