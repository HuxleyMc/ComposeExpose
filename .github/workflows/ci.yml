name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

env:
  ANDROID_PLATFORM: android-36
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  verify:
    name: Build and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/cache
            /usr/local/lib/android/sdk/platforms/android-36
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_PLATFORM }}

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;$ANDROID_PLATFORM"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify CI workflow contract
        run: ./scripts/verify-ci-workflow.py

      - name: Verify release workflow contract
        run: ./scripts/verify-release-workflow.py

      - name: Check root formatting
        run: ./gradlew --no-daemon spotlessCheck

      - name: Check demo formatting
        run: ./gradlew --no-daemon -p demo spotlessCheck

      - name: Build all modules
        run: ./gradlew --no-daemon clean build

      - name: Smoke demo and MCP stdio
        run: ./scripts/smoke-demo.sh

  release-smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/cache
            /usr/local/lib/android/sdk/platforms/android-36
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_PLATFORM }}

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;$ANDROID_PLATFORM"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify publishing metadata
        run: ./scripts/verify-publishing-metadata.sh

      - name: Smoke published consumer
        run: ./scripts/smoke-published-consumer.sh
